<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ProjectFlow - Sin conexion</title>
  <meta name="theme-color" content="#0f1117">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { min-height: 100vh; display: grid; place-items: center; padding: 20px; }
    .offline-card {
      width: min(520px, 100%);
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 24px;
      box-shadow: var(--shadow);
    }
    .offline-title { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    .offline-text { color: var(--text-secondary); line-height: 1.6; margin-bottom: 18px; }
    .offline-actions { display: flex; gap: 10px; flex-wrap: wrap; }
  </style>
</head>
<body>
  <section class="offline-card" role="status" aria-live="polite">
    <h1 class="offline-title">Sin conexion</h1>
    <p class="offline-text">ProjectFlow sigue disponible con datos locales. Revisa tu internet y vuelve a intentar para sincronizar con la nube.</p>
    <div class="offline-actions">
      <button class="btn-primary" onclick="location.reload()">Reintentar</button>
      <a class="btn-secondary" href="./index.html">Abrir app</a>
    </div>
  </section>
</body>
</html>
